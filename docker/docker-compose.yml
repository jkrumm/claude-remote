networks:
  agent-net:
    driver: bridge
  homelab:
    external: true
    name: ${HOMELAB_NETWORK_NAME:-homelab_cloudflared}

services:

  # --- Infrastructure (always latest, Watchtower-managed) ---

  postgres:
    image: postgres:latest
    container_name: claude-remote-postgres
    restart: unless-stopped
    networks: [agent-net]
    ports:
      - "127.0.0.1:5432:5432"
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_USER: claude-remote
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: claude-remote
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claude-remote"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:latest
    container_name: claude-remote-valkey
    restart: unless-stopped
    networks: [agent-net]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Bridge API ---
  # Build context: api/ directory in this repo (../api relative to docker/)
  claude-remote-api:
    build:
      context: ${CLAUDE_REMOTE_API_PATH:-../api}
      dockerfile: Dockerfile
    container_name: claude-remote-api
    restart: unless-stopped
    networks:
      - agent-net
      - homelab
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      - TICKTICK_CLIENT_ID=${TICKTICK_CLIENT_ID}
      - TICKTICK_CLIENT_SECRET=${TICKTICK_CLIENT_SECRET}
      - NTFY_BASE_URL=${NTFY_BASE_URL}
      - NTFY_TOKEN=${NTFY_TOKEN}
      - NTFY_TOPIC=claude-remote
      - CLAUDE_REMOTE_API_SECRET=${CLAUDE_REMOTE_API_SECRET}
    volumes:
      - api-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy

  # --- Docker socket proxy (for NanoClaw) ---
  # Limits Docker API surface exposed to nanoclaw: only container lifecycle ops allowed.
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: claude-remote-docker-proxy
    restart: unless-stopped
    networks:
      - agent-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - INFO=1
      - CONTAINERS=1
      - IMAGES=1
      - NETWORKS=1
      - POST=1
      - DELETE=1

  # --- NanoClaw Telegram bot ---
  # Source lives in nanoclaw/ (root of claude-remote repo). Telegram channel applied via /add-telegram.
  nanoclaw:
    build:
      context: ../nanoclaw
      dockerfile: Dockerfile
    container_name: claude-remote-nanoclaw
    restart: unless-stopped
    networks:
      - agent-net
    volumes:
      - nanoclaw-data:/data
      # Mount claude-remote user credentials read-only so entrypoint can extract
      # the current OAuth token on every restart (auto-refreshed by the running claude CLI).
      - /home/claude-remote/.claude/.credentials.json:/run/secrets/claude-credentials:ro
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - CLAUDE_REMOTE_API_URL=http://claude-remote-api:4000
      - CLAUDE_REMOTE_API_SECRET=${CLAUDE_REMOTE_API_SECRET}
      - VIBEKANBAN_BASE_URL=http://vibekanban:3000
      - DOCKER_HOST=tcp://docker-proxy:2375
      - CLAUDE_CREDENTIALS_FILE=/run/secrets/claude-credentials
    depends_on:
      claude-remote-api:
        condition: service_healthy
      docker-proxy:
        condition: service_started

  # --- Vibekanban AI agent orchestration ---
  # Build from source: clone vibe-kanban to ~/SourceRoot/vibe-kanban (see MANUAL_TODOS.md M-06)
  # Requires GitHub OAuth app (VIBEKANBAN_GITHUB_OAUTH_CLIENT_ID/SECRET)
  vibekanban:
    build:
      context: ${VIBEKANBAN_REPO_PATH:-../../vibe-kanban}
      dockerfile: crates/remote/Dockerfile
    container_name: claude-remote-vibekanban
    restart: unless-stopped
    networks:
      - agent-net
      - homelab
    ports:
      - "127.0.0.1:3000:8081"
    environment:
      - SERVER_DATABASE_URL=postgresql://claude-remote:${POSTGRES_PASSWORD}@postgres:5432/remote
      - SERVER_LISTEN_ADDR=0.0.0.0:8081
      - ELECTRIC_URL=http://electric:3000
      - VIBEKANBAN_REMOTE_JWT_SECRET=${VIBEKANBAN_JWT_SECRET}
      - GITHUB_OAUTH_CLIENT_ID=${VIBEKANBAN_GITHUB_OAUTH_CLIENT_ID:-}
      - GITHUB_OAUTH_CLIENT_SECRET=${VIBEKANBAN_GITHUB_OAUTH_CLIENT_SECRET:-}
      - SERVER_PUBLIC_BASE_URL=${VIBEKANBAN_PUBLIC_URL:-https://claude-remote.jkrumm.com}
      - AZURE_STORAGE_ACCOUNT_NAME=devstoreaccount1
      - AZURE_STORAGE_ACCOUNT_KEY=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==
      - AZURE_STORAGE_CONTAINER_NAME=issue-attachments
      - AZURE_STORAGE_ENDPOINT_URL=http://azurite:10000/devstoreaccount1
      - AZURE_STORAGE_PUBLIC_ENDPOINT_URL=http://localhost:10000/devstoreaccount1
      - ELECTRIC_ROLE_PASSWORD=${VIBEKANBAN_ELECTRIC_ROLE_PASSWORD:-remote}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8081/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      azurite-init:
        condition: service_completed_successfully

  # --- ElectricSQL sync engine (for vibekanban) ---
  electric:
    image: electricsql/electric:1.4.13
    container_name: claude-remote-electric
    restart: unless-stopped
    networks: [agent-net]
    environment:
      - DATABASE_URL=postgresql://claude-remote:${POSTGRES_PASSWORD}@postgres:5432/remote?sslmode=disable
      - AUTH_MODE=insecure
      - ELECTRIC_INSECURE=true
      - ELECTRIC_MANUAL_TABLE_PUBLISHING=true
      - ELECTRIC_USAGE_REPORTING=false
      - ELECTRIC_FEATURE_FLAGS=allow_subqueries,tagged_subqueries
    depends_on:
      postgres:
        condition: service_healthy

  # --- Azure blob storage emulator (for vibekanban attachments) ---
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: claude-remote-azurite
    restart: unless-stopped
    networks: [agent-net]
    command: "azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --loose --skipApiVersionCheck"
    volumes:
      - azurite-data:/data
    healthcheck:
      test: ["CMD", "nc", "127.0.0.1", "10000", "-z"]
      interval: 5s
      timeout: 5s
      retries: 10

  azurite-init:
    image: mcr.microsoft.com/azure-cli:latest
    container_name: claude-remote-azurite-init
    networks: [agent-net]
    environment:
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        az storage container create --name issue-attachments 2>/dev/null || true
        az storage cors add --services b --methods GET PUT POST DELETE OPTIONS --origins '*' --allowed-headers '*' --exposed-headers '*' --max-age 3600
        echo "Azurite initialized"
    depends_on:
      azurite:
        condition: service_healthy

  # Watchtower removed — homelab already runs its own watchtower that covers infra images

volumes:
  pgdata:
  api-data:
  nanoclaw-data:
  azurite-data:
